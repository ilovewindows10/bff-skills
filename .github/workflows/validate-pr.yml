name: Validate PR Submission

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Detect changed skill directory
        id: detect
        run: |
          git fetch origin main
          SKILL_NAME=$(git diff --name-only origin/main...HEAD | grep '^skills/' | cut -d'/' -f2 | sort -u | head -1)

          if [ -z "$SKILL_NAME" ]; then
            echo "skill_found=false" >> "$GITHUB_OUTPUT"
            echo "No skill directory found in changed files"
          else
            echo "skill_found=true" >> "$GITHUB_OUTPUT"
            echo "skill_name=$SKILL_NAME" >> "$GITHUB_OUTPUT"
            echo "Detected skill: $SKILL_NAME"
          fi

      - name: Run validation
        if: steps.detect.outputs.skill_found == 'true'
        id: validate
        run: |
          SKILL_NAME="${{ steps.detect.outputs.skill_name }}"

          # Run validation and capture JSON stdout (human-readable goes to stderr)
          set +e
          VALIDATION_JSON=$(bun run scripts/validate-frontmatter.ts "skills/$SKILL_NAME" 2>/dev/null)
          EXIT_CODE=$?
          set -e

          # Save JSON output for subsequent steps
          echo "$VALIDATION_JSON" > /tmp/validation-result.json

          # Parse key fields from JSON
          STATUS=$(echo "$VALIDATION_JSON" | jq -r '.status')
          TOTAL_ERRORS=$(echo "$VALIDATION_JSON" | jq -r '.data.totalErrors')
          TOTAL_WARNINGS=$(echo "$VALIDATION_JSON" | jq -r '.data.totalWarnings')

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "total_errors=$TOTAL_ERRORS" >> "$GITHUB_OUTPUT"
          echo "total_warnings=$TOTAL_WARNINGS" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          echo "Validation status: $STATUS (errors: $TOTAL_ERRORS, warnings: $TOTAL_WARNINGS)"

      - name: Post PR comment
        if: steps.detect.outputs.skill_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const skillName = process.env.SKILL_NAME;
            const status = process.env.VALIDATION_STATUS;
            const totalErrors = parseInt(process.env.TOTAL_ERRORS || '0', 10);
            const totalWarnings = parseInt(process.env.TOTAL_WARNINGS || '0', 10);

            let body = '';

            if (status === 'success') {
              body = [
                `## ✅ Validation Passed`,
                '',
                `**Skill:** \`${skillName}\``,
                `**Errors:** 0`,
                `**Warnings:** ${totalWarnings}`,
                '',
                'All checks passed. This submission is ready for review.',
              ].join('\n');
            } else {
              // Read full validation JSON for error details
              let errorDetails = '';
              try {
                const raw = fs.readFileSync('/tmp/validation-result.json', 'utf-8');
                const result = JSON.parse(raw);
                const details = result.error?.details || [];

                if (details.length > 0) {
                  errorDetails = details.map(d => {
                    const loc = d.line ? ` (line ${d.line})` : '';
                    return [
                      `### \`${d.rule}\`${loc}`,
                      `- **File:** \`${d.file}\``,
                      `- **Message:** ${d.message}`,
                      `- **Found:** \`${d.found}\``,
                      `- **Expected:** \`${d.expected}\``,
                    ].join('\n');
                  }).join('\n\n');
                }
              } catch (e) {
                errorDetails = '_Could not parse validation details._';
              }

              body = [
                `## ❌ Validation Failed`,
                '',
                `**Skill:** \`${skillName}\``,
                `**Errors:** ${totalErrors}`,
                `**Warnings:** ${totalWarnings}`,
                '',
                'Please fix the following errors before this PR can be merged:',
                '',
                errorDetails,
              ].join('\n');
            }

            // Find existing bot comment to update (avoid duplicates on re-push)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && (c.body.includes('## ✅ Validation Passed') || c.body.includes('## ❌ Validation Failed'))
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          SKILL_NAME: ${{ steps.detect.outputs.skill_name }}
          VALIDATION_STATUS: ${{ steps.validate.outputs.status }}
          TOTAL_ERRORS: ${{ steps.validate.outputs.total_errors }}
          TOTAL_WARNINGS: ${{ steps.validate.outputs.total_warnings }}

      - name: Fail if validation errors
        if: steps.detect.outputs.skill_found == 'true' && steps.validate.outputs.status == 'error'
        run: |
          echo "::error::Validation failed with $TOTAL_ERRORS errors"
          exit 1
        env:
          TOTAL_ERRORS: ${{ steps.validate.outputs.total_errors }}
